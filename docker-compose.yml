# ============================================
# Docker Compose
# بيسهل عليك تشغيل الـ container بأمر واحد
# ============================================
version: "3.8"

services:
  cv-analyzer:
    # ابني الـ image من الـ Dockerfile في نفس الفولدر
    build: .
    
    # الـ port: "محلي:container"
    # يعني افتح localhost:8000 على جهازك
    # وهو يوصله على 7860 جوه الـ container
    ports:
      - "8000:7860"
    
    # لو عايز تعمل تعديل في الكود يتعكس فوراً
    # بدون ما تعيد بناء الـ image
    volumes:
      - .:/app
    
    # متغيرات البيئة (اختياري)
    # تقدر تحط الـ API key هنا بدل ما تكتبه في الـ UI
    # environment:
    #   - GEMINI_API_KEY=your_key_here
